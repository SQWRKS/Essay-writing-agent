version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: essay_agent_backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////data/essay_agent.db
      - BACKEND_PORT=8000
    ports:
      - "8000:8000"
    volumes:
      - db_data:/data
      - figures:/tmp/figures
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: essay_agent_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  figures:
